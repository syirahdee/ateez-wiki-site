<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ATEEZ Official</title>
    <link rel="stylesheet" href="style.css">
    
    <!-- Google Fonts: Abhaya Libre -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Abhaya+Libre:wght@400;700;800&display=swap" rel="stylesheet">
    
    <!-- Font Awesome for Social Media Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <div class="hero-container">
        <!-- Header Navigation -->
        <header>
            <div class="logo">ATEEZ</div>
            <nav>
                <a href="#">HOME</a>
                <a href="#">STREAM</a>
                <a href="#">TOKTOQ</a>
                <a href="#">STORE</a>
            </nav>
        </header>

        <!-- Main Content Area -->
        <main class="content">
            <!-- Background Large Serif Text -->
            <h1 class="bg-title">ATEEZ</h1>
            
            <!-- Hero Group Image -->
            <img src="img/ateez_main_page-removebg-preview.png" alt="ATEEZ" class="hero-image">
            
            <!-- Bottom Button Menu -->
            <div class="button-group">
                <a href="#" class="btn btn-pink">MEMBERS</a>
                <a href="#" class="btn btn-black">HISTORY</a>
                <a href="#" class="btn btn-black">ALBUMS</a>
                <a href="#" class="btn btn-black">AWARDS</a>
            </div>
        </main>

        <!-- Footer Social Icons -->
        <footer>
            <div class="social-icons">
                <a href="#"><i class="fab fa-youtube"></i></a>
                <a href="#"><i class="fab fa-instagram"></i></a>
                <a href="#"><i class="fab fa-twitter"></i></a>
                <a href="#"><i class="fab fa-facebook-f"></i></a>
            </div>
        </footer>
    </div>

</body>
</html>
